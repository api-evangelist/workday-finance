modified: '2026-05-19'
tags:
- Accounting
- Cloud
- Enterprise
- ERP
- Finance
- Financial Management
apis:
- name: Workday Financial Management API
  description: Core SOAP API for financial management operations including general
    ledger, accounts payable, accounts receivable, financial reporting, tax, financial
    organizations, and worktag management. Exposes data relative to accounts, accounting,
    business plans, and related financial structures.
  image: https://www.workday.com/content/dam/web/images/logo/workday-logo.svg
  humanURL: https://www.workday.com/en-us/products/financial-management/overview.html
  baseURL: https://wd2-impl-services1.workday.com/ccx/service
  tags:
  - Accounting
  - Banking
  - Finance
  - General Ledger
