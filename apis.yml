- name: Workday Resource Management API
  description: SOAP API exposing Workday Financials Resource Management data, including
    suppliers, supplier accounts, procurement, purchase orders, invoicing, business
    assets, asset depreciation, and travel and entertainment operations. Supports
    the full procure-to-pay lifecycle and asset management workflows.
  image: https://www.workday.com/content/dam/web/images/logo/workday-logo.svg
  humanURL: https://www.workday.com/en-us/products/spend-management/procure-to-pay.html
  baseURL: https://wd2-impl-services1.workday.com/ccx/service
  tags:
  - Business Assets
  - Invoicing
  - Procurement
  - Resource Management
  - Suppliers
