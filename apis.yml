    url: https://community.workday.com/sites/default/files/file-hosting/productionapi/Inventory/v45.2/Inventory.wsdl
- name: Workday Professional Services Automation API
  description: SOAP API for Professional Services Automation integrations. Exposes
    Workday Financials data for managing client-facing projects, services billing,
    resource staffing, and expense reporting within professional services organizations.
  image: https://www.workday.com/content/dam/web/images/logo/workday-logo.svg
