- name: Workday Resource Management API
  description: >-
    SOAP API exposing Workday Financials Resource Management data, including
    suppliers, supplier accounts, procurement, purchase orders, invoicing,
    business assets, asset depreciation, and travel and entertainment
    operations. Supports the full procure-to-pay lifecycle and asset management
    workflows.
