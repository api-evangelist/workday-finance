  - type: X-wsdl
    url: https://community.workday.com/sites/default/files/file-hosting/productionapi/Expenses/v41.2/Expenses.wsdl
- name: Workday Cash Management API
  description: SOAP API for managing cash positions, bank transactions, and treasury
    operations. Supports cash flow forecasting, bank account management, and financial
    reconciliation processes.
