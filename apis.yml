  description: SOAP API for project management, tracking project costs, billing, and
    resource allocation. Supports project-based accounting, cost capture, and resource
    planning workflows.
  image: https://www.workday.com/content/dam/web/images/logo/workday-logo.svg
  humanURL: https://www.workday.com/en-us/products/financial-management/projects.html
