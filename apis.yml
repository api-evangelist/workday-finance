- name: Workday Settlement Services API
  description: >-
    SOAP API for settlement management and payment services. Supports payment
    processing, bank routing, settlement runs, direct debit mandates, payment
    acknowledgements, cash balance checks, and escheatment management across
    supplier payments, employee reimbursements, and customer payments.
  image: https://www.workday.com/content/dam/web/images/logo/workday-logo.svg
  humanURL: https://www.workday.com/en-us/products/financial-management/accounting-finance.html
  baseURL: https://wd2-impl-services1.workday.com/ccx/service
