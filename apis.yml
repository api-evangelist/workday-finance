aid: workday-finance
specificationVersion: '0.19'
name: Workday Finance
description: APIs for Workday's cloud-based financial management system, enabling
  enterprise resource planning, accounting, financial analytics, procurement, grants
  management, inventory, and settlement services.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
