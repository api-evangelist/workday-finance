naftiko: "1.0.0-alpha1"

info:
  label: "Workday Finance Procurement API"
  description: "API for procurement operations including suppliers, purchase orders, supplier invoices, and requisitions in the procure-to-pay lifecycle."
  tags:
    - Workday
    - Finance
    - Procurement
    - Suppliers
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      WORKDAY_FINANCE_ACCESS_TOKEN: WORKDAY_FINANCE_ACCESS_TOKEN
      WORKDAY_TENANT: WORKDAY_TENANT

capability:
  consumes:
    - type: http
      namespace: procurement
      baseUri: https://wd2-impl-services1.workday.com/ccx/api/resource-management/v45.2/{tenant}
      description: "Workday procurement and supplier management API"
      authentication:
        type: bearer
        token: "{{WORKDAY_FINANCE_ACCESS_TOKEN}}"
      resources:
        - name: suppliers
          path: /suppliers
          description: "Supplier account management"
          operations:
            - name: list-suppliers
              method: GET
              description: "List suppliers"
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-supplier
              method: GET
              description: "Get supplier details"
              inputParameters:
                - name: supplierId
                  in: path
                  type: string
                  required: true
                  description: "Supplier identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: purchase-orders
          path: /purchaseOrders
          description: "Purchase order management"
          operations:
            - name: list-purchase-orders
              method: GET
              description: "List purchase orders"
              inputParameters:
                - name: status
                  in: query
                  type: string
                  required: false
                  description: "Filter by status"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-purchase-order
              method: POST
              description: "Create a purchase order"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  supplier: "{{tools.supplier}}"
                  orderDate: "{{tools.orderDate}}"
        - name: supplier-invoices
          path: /supplierInvoices
          description: "Supplier invoice processing"
          operations:
            - name: list-supplier-invoices
              method: GET
              description: "List supplier invoices"
              inputParameters:
                - name: status
                  in: query
                  type: string
                  required: false
                  description: "Filter by status"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-supplier-invoice
              method: POST
              description: "Create a supplier invoice"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  supplier: "{{tools.supplier}}"
                  invoiceNumber: "{{tools.invoiceNumber}}"
                  totalAmount: "{{tools.totalAmount}}"
        - name: requisitions
          path: /requisitions
          description: "Purchase requisition management"
          operations:
            - name: list-requisitions
              method: GET
              description: "List purchase requisitions"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: procurement-rest-api
      resources:
        - path: /v1/suppliers
          name: suppliers
          description: "Supplier management"
          operations:
            - method: GET
              name: list-suppliers
              description: "List suppliers"
              call: "procurement.list-suppliers"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: procurement-mcp
      transport: http
      tools:
        - name: list-suppliers
          description: "List supplier accounts"
          hints:
            readOnly: true
            openWorld: true
          call: "procurement.list-suppliers"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-purchase-orders
          description: "List purchase orders"
          hints:
            readOnly: true
            openWorld: true
          call: "procurement.list-purchase-orders"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-supplier-invoice
          description: "Create a supplier invoice for processing"
          hints:
            readOnly: false
            destructive: false
          call: "procurement.create-supplier-invoice"
          outputParameters:
            - type: object
              mapping: "$."
