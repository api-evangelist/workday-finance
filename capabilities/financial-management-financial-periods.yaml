naftiko: 1.0.0-alpha2
info:
  label: Workday Finance Financial Management API — Financial Periods
  description: 'Workday Finance Financial Management API — Financial Periods. 1 operations. Lead operation: List Financial
    Periods. Self-contained Naftiko capability covering one Workday Finance business surface.'
  tags:
  - Workday Finance
  - Financial Periods
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKDAY_FINANCE_API_KEY: WORKDAY_FINANCE_API_KEY
capability:
  consumes:
  - type: http
    namespace: financial-management-financial-periods
    baseUri: https://wd2-impl-services1.workday.com/ccx/api/financial-management/v41.2/{tenant}
    description: Workday Finance Financial Management API — Financial Periods business capability. Self-contained, no shared
      references.
    resources:
    - name: financialPeriods
      path: /financialPeriods
      operations:
      - name: listfinancialperiods
        method: GET
        description: List Financial Periods
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fiscalYear
          in: query
          type: string
          description: Filter by fiscal year
    authentication:
      type: bearer
      token: '{{env.WORKDAY_FINANCE_API_KEY}}'
  exposes:
  - type: rest
    namespace: financial-management-financial-periods-rest
    port: 8080
    description: REST adapter for Workday Finance Financial Management API — Financial Periods. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/financialperiods
      name: financialperiods
      description: REST surface for financialPeriods.
      operations:
      - method: GET
        name: listfinancialperiods
        description: List Financial Periods
        call: financial-management-financial-periods.listfinancialperiods
        with:
          fiscalYear: rest.fiscalYear
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: financial-management-financial-periods-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workday Finance Financial Management API — Financial Periods. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: list-financial-periods
      description: List Financial Periods
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: financial-management-financial-periods.listfinancialperiods
      with:
        fiscalYear: tools.fiscalYear
      outputParameters:
      - type: object
        mapping: $.
