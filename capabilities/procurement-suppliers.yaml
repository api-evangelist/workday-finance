naftiko: 1.0.0-alpha2
info:
  label: Workday Finance Procurement API — Suppliers
  description: 'Workday Finance Procurement API — Suppliers. 2 operations. Lead operation: List Suppliers. Self-contained
    Naftiko capability covering one Workday Finance business surface.'
  tags:
  - Workday Finance
  - Suppliers
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKDAY_FINANCE_API_KEY: WORKDAY_FINANCE_API_KEY
capability:
  consumes:
  - type: http
    namespace: procurement-suppliers
    baseUri: https://wd2-impl-services1.workday.com/ccx/api/resource-management/v45.2/{tenant}
    description: Workday Finance Procurement API — Suppliers business capability. Self-contained, no shared references.
    resources:
    - name: suppliers
      path: /suppliers
      operations:
      - name: listsuppliers
        method: GET
        description: List Suppliers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: suppliers-supplierId
      path: /suppliers/{supplierId}
      operations:
      - name: getsupplier
        method: GET
        description: Get Supplier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.WORKDAY_FINANCE_API_KEY}}'
  exposes:
  - type: rest
    namespace: procurement-suppliers-rest
    port: 8080
    description: REST adapter for Workday Finance Procurement API — Suppliers. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/suppliers
      name: suppliers
      description: REST surface for suppliers.
      operations:
      - method: GET
        name: listsuppliers
        description: List Suppliers
        call: procurement-suppliers.listsuppliers
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/suppliers/{supplierid}
      name: suppliers-supplierid
      description: REST surface for suppliers-supplierId.
      operations:
      - method: GET
        name: getsupplier
        description: Get Supplier
        call: procurement-suppliers.getsupplier
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: procurement-suppliers-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workday Finance Procurement API — Suppliers. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: list-suppliers
      description: List Suppliers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: procurement-suppliers.listsuppliers
      outputParameters:
      - type: object
        mapping: $.
    - name: get-supplier
      description: Get Supplier
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: procurement-suppliers.getsupplier
      outputParameters:
      - type: object
        mapping: $.
