specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Workday Finance
providerId: workday-finance
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Financial Management
  - Accounting
  - Rate Limiting
description: Workday Finance APIs operate inside a customer's Workday tenant and inherit the tenant's API throughput, integration concurrency, and Studio batching limits. Workday does not publish numeric rate limits on its public marketing site; specifics live in Workday Community / Customer Center documentation behind authentication.
sources:
  - https://www.workday.com/en-us/enterprise-resource-planning.html
notes: No public per-second or per-minute limits documented. Scaffold tier numbers have been removed.
responseCodes: {}
limits:
  - name: Tenant-Inherited Throughput
    scope: tenant
    metric: varies
    limit: governed by the parent Workday tenant; not publicly documented
    notes: Financial Management web services share the tenant's API capacity envelope; per-tenant transactional and concurrency limits apply.
policies:
  - name: Tenant Inheritance
    description: Finance APIs share the underlying Workday tenant's API quotas; throttling, retries, and integration backoff follow the tenant's policies.
  - name: Customer Center Documentation
    description: Numeric thresholds for Financial Management transactions, journal posting batches, and integration concurrency are published to authenticated Workday customers in Workday Community.
