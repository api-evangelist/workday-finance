}

enum ProjectStatus {
  PLANNING
  ACTIVE
  ON_HOLD
  COMPLETED
  CANCELED
}

enum WebhookEventType {
  JOURNAL_POSTED
  INVOICE_APPROVED
  PAYMENT_COMPLETED
  PO_APPROVED
