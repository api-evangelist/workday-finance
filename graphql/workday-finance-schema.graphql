  CLOSED
  CANCELED
}

enum RequisitionStatus {
  DRAFT
  IN_REVIEW
  APPROVED
  SOURCING
  ORDERED
  CANCELED
}

enum VendorInvoiceStatus {
  DRAFT
  IN_REVIEW
  APPROVED
