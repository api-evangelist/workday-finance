  VOID
}

enum PaymentStatus {
  PENDING
  PROCESSING
  COMPLETED
  FAILED
  VOID
}

enum ContractStatus {
  DRAFT
  IN_REVIEW
  ACTIVE
  AMENDED
  EXPIRED
