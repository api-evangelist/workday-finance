description: FOCUS-aligned FinOps stub for Workday Finance. The product is sold as a module of a Workday tenant subscription; per-API-call pricing and a public usage API are not exposed, so meters describe contractual entitlement rather than runtime telemetry.
sources:
  - https://www.workday.com/en-us/enterprise-resource-planning.html
notes: No public pricing or billing API exists. Scaffold api_request and compute meters have been removed.
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Workday, Inc.
serviceCategory: Financial Management SaaS
billingModel:
  pricingCategory: Subscription
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
focusColumns:
  ServiceName: Workday Financial Management
  ServiceCategory: Financial Management SaaS
  ProviderName: Workday
  PublisherName: Workday, Inc.
  InvoiceIssuerName: Workday, Inc.
  BillingCurrency: USD
meters:
  - name: financial_management_subscription
    description: Annual Workday Financial Management module entitlement attached to the tenant subscription.
    unit: month
    aggregation: max
    dimensions:
      - tenant
  - name: financial_workforce_seats
    description: Licensed user count entitled to the Financial Management module; sized at contract time rather than billed as runtime overage.
    unit: seat
    aggregation: max
    dimensions:
      - tenant
principles:
  - name: Visibility
    description: Track Workday Finance spend at the contract / module level using signed order forms; supplement with internal usage analytics from Workday Reports and Audit Trails to monitor whether the licensed module is actually being used by the finance organization.
  - name: Allocation
    description: Allocate the Financial Management module fee to the CFO organization and any subsidiary cost centers consuming the ledger; integrations into Workday from external systems can be charged back to the source system owner.
  - name: Optimization
    description: At renewal, right-size licensed seats, retire unused legal entities or business processes, and consolidate satellite accounting tools where Workday Finance can absorb the workload.
  - name: Accountability
    description: The Workday Finance owner inside the Office of the CFO should sign off on renewals, module add-ons, and integration scope; review with Workday Customer Success at least annually.
maintainers:
